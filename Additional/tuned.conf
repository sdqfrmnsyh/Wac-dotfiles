#
# tuned configuration
#
[main]
include = balanced

[cpu]
governor = schedutil
boost = 1

[sysctl]
kernel.sched_autogroup_enabled = 0
kernel.nmi_watchdog = 0
kernel.numa_balancing = 0
kernel.split_lock_mitigate = 0
kernel.printk = 3 3 3 3
kernel.kptr_restrict = 2
vm.dirty_bytes = 52428800
vm.dirty_background_bytes = 10485760
vm.dirty_expire_centisecs = 3000
vm.dirty_writeback_centisecs = 500
vm.page-cluster = 0
vm.min_free_kbytes = 32768
vm.max_map_count = 1048576
fs.inotify.max_user_instances = 1024
fs.inotify.max_user_watches = 524288
fs.file-max = 2097152
net.core.default_qdisc = fq_codel
net.ipv4.tcp_keepalive_time = 120

[vm]
transparent_hugepages = never

[disk]
type = disk
devices = nvme*
readahead = 4096

[sysfs]
/sys/devices/system/cpu/cpufreq/policy0/cpb = 1
/sys/devices/system/cpu/cpufreq/policy1/cpb = 1
/sys/devices/system/cpu/cpufreq/schedutil/rate_limit_us = 1000
/sys/kernel/mm/ksm/run = 0
/sys/devices/system/cpu/cpu0/power/pm_qos_resume_latency_us = 0
/sys/devices/system/cpu/cpu1/power/pm_qos_resume_latency_us = 0
/sys/class/drm/card1-eDP-1/amdgpu/panel_power_savings = 0
/sys/block/nvme0n1/queue/read_ahead_kb = 4096
/sys/block/nvme0n1/queue/iostats = 0
/sys/block/nvme0n1/queue/add_random = 0


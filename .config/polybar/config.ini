[colors]
background = #E61a1e25
foreground = #cbcbcb
primary = #00ffbc

[bar/example]
dpi-x = 98
dpi-y = 98
width = 100%
height = 34
padding-left = 1
padding-right = 1

background = #001a1e25
foreground = ${colors.foreground}
bottom = false
border-top-size = 5
border-bottom-size = 0
border-top-color = #001a1e25
border-bottom-color = #001a1e25

line-size = 0

modules-left = round-left launcher round-right empty-space round-left workspaces round-right empty-space round-left wlan round-right
modules-center = round-left2 tray round-right2
modules-right = round-left time round-right empty-space round-left pulseaudio spacee battery round-right empty-space round-left cpu memory round-right

; --- FIX FONT ---
font-0 = "JetBrainsMono Nerd Font:style=Bold:pixelsize=11;3"
font-1 = "JetBrainsMono Nerd Font:size=20;5"
font-2 = "Material Design Icons:style=Regular:size=9;3"
font-3 = "Source Han Code JP:style=Regular:size=11;3"
font-4 = "Symbols Nerd Font Mono:style=Regular:size=11;3"

[module/launcher]
type = custom/text
label = "󰍉 Search"
label-background = ${colors.background}
label-foreground = ${colors.foreground}
label-padding = 1
click-left = rofi -show drun

[module/tray]
type = internal/tray
tray-background = ${colors.background}
tray-size = 100%

[module/empty-space]
type = custom/text
label = " "

[module/spacee]
type = custom/text
label = "  "
label-background = ${colors.background}

[module/round-left]
type = custom/text
label = %{T3}%{T-}
label-foreground = ${colors.background}

[module/round-right]
type = custom/text
label = %{T3}%{T-}
label-foreground = ${colors.background}

[module/round-left2]
type = custom/text
label = %{T3}%{T-}
label-foreground = ${colors.background}

[module/round-right2]
type = custom/text
label = %{T3}%{T-}
label-foreground = ${colors.background}

[module/time]
type = internal/date
interval = 60
format = <label>
format-background = ${colors.background}
format-foreground = ${colors.foreground}
;date = 󰥔 %H:%M%{F-}
date = "%A, %d %B at %H:%M"
time-alt = %H:%M
label = %date%%time%

[module/wlan]
type = internal/network
interface = wlan0
interval = 1.0

; FIX: Klik kiri buka nm-connection-editor & ganti ikon MDI
format-connected = <label-connected>
label-connected = "%{A1:kitty -e nmtui:}󰖩  %essid%%{A}"
label-connected-foreground = ${colors.foreground}
label-connected-background = ${colors.background}

format-disconnected = <label-disconnected>
label-disconnected = "%{A1:kitty -e nmtui:}󰖪  Disconnected%{A}"
label-disconnected-foreground = ${colors.foreground}
label-disconnected-background = ${colors.background}

[module/workspaces]
type = internal/xworkspaces
pin-workspaces = false
enable-click = true
enable-scroll = false

format = <label-state>

; FIX: Ikon Lingkaran MDI (Bebas error U+f62f)
label-active = 󰝥
label-active-foreground = ${colors.foreground}
label-active-background = ${colors.background}
label-active-padding = 2

label-occupied = 
label-occupied-foreground = ${colors.foreground}
label-occupied-background = ${colors.background}
label-occupied-padding = 2

label-urgent = 
label-urgent-foreground = #ff5555
label-urgent-background = ${colors.background}
label-urgent-padding = 2

label-empty = 󰝦
label-empty-foreground = ${colors.foreground}
label-empty-background = ${colors.background}
label-empty-padding = 2

[module/pulseaudio]
type = internal/pulseaudio
interval = 5

; FIX: Ganti ikon teks Jepang ke MDI
format-volume = <ramp-volume> <label-volume>
format-volume-background = ${colors.background}
format-volume-foreground = ${colors.foreground}

format-muted = <label-muted>
format-muted-prefix = "󰝟 "
format-muted-background = ${colors.background}
format-muted-prefix-foreground = ${colors.foreground}

label-muted = "Muted"
label-volume = "%percentage%%"

ramp-volume-0 = 󰕿
ramp-volume-1 = 󰖀
ramp-volume-2 = 󰕾
click-right = pavucontrol &

[module/battery]
type = internal/battery
full-at = 100
battery = BAT0
adapter = AC
poll-interval = 2

format-charging = <animation-charging> <label-charging>
format-charging-background = ${colors.background}
format-charging-foreground = ${colors.foreground}

format-discharging = <ramp-capacity> <label-discharging>
format-discharging-background = ${colors.background}
format-discharging-foreground = ${colors.foreground}

format-full = <label-full>
format-full-prefix = "󰁹 "
format-full-background = ${colors.background}
format-full-foreground = ${colors.foreground}

label-charging = "%percentage%%"
label-discharging = "%percentage%%"
label-full = "Full"

; Ikon Kapasitas (Font-2)
ramp-capacity-0 = 󰁺
ramp-capacity-1 = 󰁼
ramp-capacity-2 = 󰁾
ramp-capacity-3 = 󰂀
ramp-capacity-4 = 󰁹

; Animasi Cas (Font-2)
animation-charging-0 = %{T3}󰢜%{T-}
animation-charging-1 = %{T3}󰂇%{T-}
animation-charging-2 = %{T3}󰂉%{T-}
animation-charging-3 = %{T3}󰢝%{T-}
animation-charging-4 = %{T3}󰂅%{T-}
animation-charging-framerate = 750

[module/memory]
type = internal/memory
interval = 2
format-prefix = " 󰋊 " 
format-prefix-foreground = #D8DEE9
format-background = ${colors.background}
format-foreground = ${colors.foreground}
format = <label>
label = %mb_used%

[module/cpu]
type = internal/cpu
interval = 2.0
format-prefix =" 󰍛 "
format =  <label>
format-prefix-foreground = ${colors.foreground}
label = "%percentage%% "
label-padding = 0
format-background = ${colors.background}
format-foreground = ${colors.foreground}
